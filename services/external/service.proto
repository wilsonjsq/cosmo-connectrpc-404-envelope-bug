// Hand-written to mirror what `wgc grpc-service generate` emits for the
// equivalent operation. Only GetStatus is registered here — requests for
// any other method on this service fall through to vanguard's unknown
// handler, which is the surface under test.
syntax = "proto3";

package mini.external.v1;

service ExternalService {
  rpc GetStatus(GetStatusRequest) returns (GetStatusResponse) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }
}

message GetStatusRequest {}

message GetStatusResponse {
  string status = 1;
}
